name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          A77207: ${{ secrets.A77207 }}
          B33DD2: ${{ secrets.B33DD2 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A77207', '')
          bm = os.environ.get('B33DD2', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 227b334e700a317444 -->', gm)
          if bm:
              s2 = s2.replace('<!-- 22e349dde296e231c3bc9dc3d4ad19e9c4696bd4 -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
